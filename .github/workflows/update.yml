name: Auto Update Ygosu Dashboard

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

# ★ 에러 원인 차단: 봇에게 파일 저장(Write) 권한을 강제로 부여합니다.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Crawler Script
      run: python main.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.io"
        git add -A
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update rankings" && git push)
# ... (앞부분 생략)
    - name: Run Crawler Script
      run: python main.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.io"
        # ★ 핵심: 여기서 index.html을 강제로 창고에 박아넣습니다!
        git add index.html ygosu_prev_rank.csv ygosu_prev_rank_receive.csv
        git commit -m "update dashboard" || echo "No changes"
        git push
