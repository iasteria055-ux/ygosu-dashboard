name: Update Supabase DB

on:
  schedule:
    - cron: '*/30 * * * *' # 30분마다 자동 실행
  workflow_dispatch: # 수동 실행 버튼

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 최신 버전(v4)으로 깃허브 저장소 가져오기 (노란색 경고 해결)
    - uses: actions/checkout@v4

    # 2. 최신 버전(v5)으로 파이썬 환경 세팅 (노란색 경고 해결)
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. 크롤링에 필요한 부품 설치
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    # 4. 파이썬 로봇 실행 (DB로 데이터 쏘기)
    - name: Run Crawler Script
      run: python main.py
      
    # ★ 기존에 있던 git commit, git push 부분은 이제 싹 지웠습니다! (에러 원인 제거)
