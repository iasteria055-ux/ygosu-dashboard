<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>부우 게시판 미네랄 대시보드</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,800;1,900&family=Noto+Sans+KR:wght@500;700;900&display=swap');
        
        body {
            background-color: #f4f2f7;
            background-image: linear-gradient(#e5e0f0 1px, transparent 1px), linear-gradient(90deg, #e5e0f0 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: 'Noto Sans KR', sans-serif;
            color: #2b1a5a;
            margin: 0; padding: 40px 20px;
            display: flex; justify-content: center;
        }

        .container { max-width: 1200px; width: 100%; }

        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { 
            font-family: 'Montserrat', sans-serif; font-style: italic; font-weight: 900; 
            font-size: 44px; margin: 0; color: #2b1a5a; text-transform: uppercase; letter-spacing: -1px;
            text-shadow: 4px 4px 0px #ffc107;
        }
        .header p { color: #666; font-weight: 700; margin-top: 10px; }

        /* JSA 스타일의 상단 플랫 탭 */
        .tabs { 
            display: flex; justify-content: center; gap: 12px; margin-bottom: 40px; 
            border-bottom: 3px solid #e5e0f0; padding-bottom: 12px;
        }
        .tab {
            background: #fff; color: #2b1a5a; border: 2px solid #e5e0f0;
            padding: 12px 28px; border-radius: 8px; cursor: pointer; font-weight: 900; 
            font-size: 14px; transition: all 0.2s; box-shadow: 0 4px 0 #e5e0f0;
        }
        .tab:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #e5e0f0; }
        .tab.active { 
            background: #ff4d00; color: #fff; border-color: #ff4d00; box-shadow: 0 4px 0 #cc3d00; 
        }

        /* JSA 현황판 격자 구조 카드 배열 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
            gap: 25px;
        }

        /* 프로필 카드로 전면 대수정 */
        .card {
            background: #ffffff;
            border: 4px solid #2b1a5a;
            border-radius: 14px;
            padding: 30px 20px 20px;
            position: relative;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 8px 8px 0px rgba(43, 26, 90, 0.1);
            transition: all 0.2s;
        }
        .card:hover { transform: translateY(-5px); }

        /* 좌측 상단 강렬한 랭킹 스티커 */
        .rank-badge {
            position: absolute; top: -15px; left: -10px;
            padding: 6px 14px; border-radius: 6px;
            font-family: 'Montserrat', sans-serif; font-style: italic; font-weight: 900; font-size: 16px;
            background: #2b1a5a; color: #fff; border: 2px solid #fff;
        }
        .card:nth-child(1) .rank-badge { background: #ffc107; color: #2b1a5a; }
        .card:nth-child(2) .rank-badge { background: #a0aeb5; color: #2b1a5a; }
        .card:nth-child(3) .rank-badge { background: #cd7f32; color: #fff; }

        /* ✨ JSA 감성의 원형 아바타 프로필 박스 */
        .avatar-box {
            width: 75px; height: 75px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; font-weight: 900; color: #fff;
            margin-bottom: 15px; border: 4px solid #2b1a5a;
            box-shadow: 0 4px 10px rgba(43,26,90,0.15);
            text-transform: uppercase;
        }

        .nick { font-size: 18px; font-weight: 900; margin-bottom: 18px; }
        .nick a { color: #2b1a5a; text-decoration: none; }
        .nick a:hover { color: #ff4d00; text-decoration: underline; }

        /* 스탯 디자인 */
        .stats { background: #f4f2f7; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; }
        .stat-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .stat-row:last-child { margin-bottom: 0; }
        
        .stat-label { font-size: 12px; font-weight: 700; color: #777; }
        .stat-val { font-family: 'Montserrat', sans-serif; font-style: italic; font-weight: 900; font-size: 15px; }
        .val-give { color: #ff4d00; }
        .val-recv { color: #00a8ff; }

        #loading { text-align: center; font-size: 18px; font-weight: bold; grid-column: 1 / -1; margin-top: 50px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>BOARD DASHBOARD</h1>
        <p>부우 게시판 실시간 연동 멤버 현황판</p>
    </div>

    <div class="tabs">
        <div class="tab" onclick="changeTab('day')">일간</div>
        <div class="tab" onclick="changeTab('week')">주간</div>
        <div class="tab" onclick="changeTab('month')">월간</div>
        <div class="tab active" onclick="changeTab('all')">전체 누적</div>
    </div>

    <div class="grid-container" id="board-content">
        <div id="loading">데이터 창고 개방 중... 📡</div>
    </div>
</div>

<script>
    // 💡 여기에 본인의 URL과 KEY를 넣어주세요!
    const SUPABASE_URL = "https://vhxiziitdsegofwdwpqa.supabase.co/rest/v1/";
    const SUPABASE_KEY = "sb_publishable_2W1zP9xviLmOdzkg2DkQgQ_nVIsIe7r";

    let allData = [];
    
    // 유저마다 고유한 예쁜 그라데이션 색상을 입혀주는 치트키 함수
    const gradients = [
        "linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%)",
        "linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%)",
        "linear-gradient(135deg, #76b852 0%, #8DC26F 100%)",
        "linear-gradient(135deg, #f1a7a1 0%, #f1cb91 100%)",
        "linear-gradient(135deg, #d4fc79 0%, #96e6a1 100%)",
        "linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%)",
        "linear-gradient(135deg, #ffcfd2 0%, #d1c4e9 100%)"
    ];
    function getGradient(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
        return gradients[Math.abs(hash) % gradients.length];
    }

    async function fetchData() {
        try {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/ygosu_rank?select=*&limit=5000`, {
                headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
            });
            allData = await res.json();
            changeTab('all');
        } catch (error) {
            document.getElementById('loading').innerText = "데이터 로드 실패";
        }
    }

    function changeTab(period) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        if(event) event.target.classList.add('active');

        const today = new Date();
        const tzOffset = today.getTimezoneOffset() * 60000;
        const localTodayStr = new Date(Date.now() - tzOffset).toISOString().split('T')[0];

        let filteredData = allData.filter(row => {
            const rowDate = new Date(row.record_date);
            if (period === 'day') return row.record_date === localTodayStr;
            if (period === 'week') {
                const diffTime = Math.abs(new Date(localTodayStr) - rowDate);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
                return diffDays <= today.getDay(); 
            }
            if (period === 'month') return rowDate.getMonth() === today.getMonth() && rowDate.getFullYear() === today.getFullYear();
            return true;
        });

        let aggregated = {};
        filteredData.forEach(row => {
            if (!aggregated[row.nickname]) {
                aggregated[row.nickname] = { nick: row.nickname, mid: row.member_id, give: 0, recv: 0 };
            }
            aggregated[row.nickname].give += row.give_mineral;
            aggregated[row.nickname].recv += row.recv_mineral;
        });

        let sortedArr = Object.values(aggregated).sort((a, b) => b.give - a.give).slice(0, 50);
        renderTable(sortedArr);
    }

    function renderTable(dataArr) {
        const content = document.getElementById('board-content');
        if (dataArr.length === 0) {
            content.innerHTML = "<div style='grid-column: 1/-1; text-align:center; padding:50px; color:#666; font-weight:bold;'>데이터가 없습니다.</div>";
            return;
        }

        let html = "";
        dataArr.forEach((user, index) => {
            const rank = index + 1;
            
            // 회원번호 매칭 성공 시 미니로그, 실패 시 전체검색 연동 완벽 처리!
            const link = user.mid 
                ? `https://ygosu.com/minilog/?member=${user.mid}&m2=profile` 
                : `https://ygosu.com/all_search/?keyword=${encodeURIComponent(user.nick)}&search_field=w`;

            const firstLetter = user.nick.charAt(0);
            const bgGradient = getGradient(user.nick);

            html += `
                <div class="card">
                    <div class="rank-badge">RANK ${rank}</div>
                    <div class="avatar-box" style="background: ${bgGradient}">${firstLetter}</div>
                    <div class="nick"><a href="${link}" target="_blank">${user.nick}</a></div>
                    <div class="stats">
                        <div class="stat-row">
                            <span class="stat-label">GIVE [+]</span>
                            <span class="stat-val val-give">${user.give.toLocaleString()}</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">TAKE [-]</span>
                            <span class="stat-val val-recv">${user.recv.toLocaleString()}</span>
                        </div>
                    </div>
                </div>
            `;
        });
        content.innerHTML = html;
    }

    fetchData();
</script>
</body>
</html>
