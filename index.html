<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>MINERAL RANKING</title>
    <style>
        body { background: #0f0a1f; color: #fff; font-family: 'Montserrat', sans-serif; margin: 0; padding: 40px; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { text-align: center; font-size: 50px; color: #ff4d00; text-shadow: 0 0 10px #ff4d00; margin-bottom: 40px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .card { background: #1a1236; border: 2px solid #ff4d00; border-radius: 15px; padding: 20px; }
        .row { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #332a5a; }
        .val { color: #ffc107; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>MINERAL RANKING</h1>
        <div class="grid">
            <div class="card" id="give"><h2>GIVE KING</h2></div>
            <div class="card" id="recv"><h2>TAKE KING</h2></div>
        </div>
    </div>

    <script>
        // 1. 여기에 본인의 수파베이스 Project URL을 넣으세요
        const SUPABASE_URL = "https://vhxiziitdsegofwdwpqa.supabase.co";
        // 2. 여기에 수파베이스 [Settings] -> [API]에서 확인한 'anon' 공개 키를 넣으세요
        const SUPABASE_KEY = "sb_publishable_2W1zP9xviLmOdzkg2DkQgQ_nVIsIe7r";

        async function fetchRanking() {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/ygosu_rank?select=*`, {
                headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
            });
            const data = await res.json();

            // 기부왕 출력 (기부량 내림차순)
            const giveList = data.sort((a,b) => b.give_mineral - a.give_mineral).slice(0, 15);
            document.getElementById('give').innerHTML += giveList.map(r => 
                `<div class="row"><span>${r.nickname}</span><span class="val">${r.give_mineral.toLocaleString()}</span></div>`).join('');

            // 일퀘왕 출력 (일퀘량 내림차순)
            const recvList = data.sort((a,b) => b.recv_mineral - a.recv_mineral).slice(0, 15);
            document.getElementById('recv').innerHTML += recvList.map(r => 
                `<div class="row"><span>${r.nickname}</span><span class="val">${r.recv_mineral.toLocaleString()}</span></div>`).join('');
        }
        fetchRanking();
    </script>
</body>
</html>
