<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>부우 게시판 미네랄 퀘스트</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,800;1,900&family=Noto+Sans+KR:wght@500;700;900&display=swap');
        
        :root {
            --bg: #0f172a; --bg-card: #1e293b; --bg-row: #334155;
            --text: #f8fafc; --text-dim: #94a3b8;
            --give: #ef4444; --recv: #3b82f6; --gold: #fbbf24;
        }

        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0; padding: 40px 20px;
            display: flex; justify-content: center;
        }

        .container { max-width: 900px; width: 100%; }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-family: 'Montserrat', sans-serif; font-style: italic; font-size: 38px; margin: 0; color: var(--gold); }
        .header p { color: var(--text-dim); margin-top: 5px; }

        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
        .tab {
            background: var(--bg-card); color: var(--text-dim); border: 2px solid var(--bg-row);
            padding: 10px 25px; border-radius: 30px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .tab.active { background: var(--gold); color: #000; border-color: var(--gold); }

        .board { background: var(--bg-card); border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .thead { display: flex; background: #0b0f19; padding: 15px; font-weight: bold; color: var(--text-dim); text-align: center; }
        .trow { display: flex; padding: 15px; border-bottom: 1px solid var(--bg-row); align-items: center; text-align: center; transition: 0.2s; }
        .trow:hover { background: rgba(255,255,255,0.05); }
        
        .col-rank { width: 15%; font-family: 'Montserrat'; font-size: 18px; font-weight: 900; }
        .col-nick { width: 35%; text-align: left; font-size: 16px; font-weight: bold; }
        .col-give { width: 25%; color: var(--give); font-weight: 900; }
        .col-recv { width: 25%; color: var(--recv); font-weight: 900; }

        .col-nick a { color: var(--text); text-decoration: none; }
        .col-nick a:hover { color: var(--gold); }

        .rank-1 { color: #fbbf24; text-shadow: 0 0 10px rgba(251, 191, 36, 0.5); font-size: 24px; }
        .rank-2 { color: #cbd5e1; font-size: 22px; }
        .rank-3 { color: #b45309; font-size: 20px; }

        #loading { text-align: center; padding: 50px; color: var(--gold); font-weight: bold; font-size: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>MINERAL QUEST</h1>
        <p>부우 게시판 명예의 전당 (자동 누적 시스템)</p>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="changeTab('day')">오늘 (일간)</div>
        <div class="tab" onclick="changeTab('week')">이번 주 (주간)</div>
        <div class="tab" onclick="changeTab('month')">이번 달 (월간)</div>
        <div class="tab" onclick="changeTab('all')">전체 누적</div>
    </div>

    <div class="board">
        <div class="thead">
            <div class="col-rank">RANK</div>
            <div class="col-nick">NICKNAME</div>
            <div class="col-give">GIVE (+)</div>
            <div class="col-recv">TAKE (-)</div>
        </div>
        <div id="loading">데이터를 불러오는 중입니다... 📡</div>
        <div id="board-content"></div>
    </div>
</div>

<script>
    // 💡 [필수 설정] 여기에 아까 복사한 주소와 열쇠를 넣으세요!
    const SUPABASE_URL = "https://vhxiziitdsegofwdwpqa.supabase.co/rest/v1/";
    const SUPABASE_KEY = "sb_publishable_2W1zP9xviLmOdzkg2DkQgQ_nVIsIe7r";

    let allData = [];

    // DB에서 데이터 가져오기
    async function fetchData() {
        try {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/ygosu_rank?select=*`, {
                headers: {
                    "apikey": SUPABASE_KEY,
                    "Authorization": `Bearer ${SUPABASE_KEY}`
                }
            });
            allData = await res.json();
            changeTab('day'); // 처음에는 '오늘' 탭 보여주기
        } catch (error) {
            document.getElementById('loading').innerText = "데이터를 불러오는 데 실패했습니다.";
        }
    }

    // 선택한 기간에 맞게 데이터 필터링 및 합산
    function changeTab(period) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');

        const today = new Date();
        let filteredData = allData.filter(row => {
            const rowDate = new Date(row.record_date);
            if (period === 'day') {
                return row.record_date === today.toISOString().split('T')[0];
            } else if (period === 'week') {
                const diffTime = Math.abs(today - rowDate);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
                return diffDays <= today.getDay(); // 이번주 내 데이터
            } else if (period === 'month') {
                return rowDate.getMonth() === today.getMonth() && rowDate.getFullYear() === today.getFullYear();
            }
            return true; // 'all' (전체 누적)
        });

        // 닉네임별로 미네랄 합산하기 (DB의 강력함!)
        let aggregated = {};
        filteredData.forEach(row => {
            if (!aggregated[row.nickname]) {
                aggregated[row.nickname] = { nick: row.nickname, mid: row.member_id, give: 0, recv: 0 };
            }
            aggregated[row.nickname].give += row.give_mineral;
            aggregated[row.nickname].recv += row.recv_mineral;
        });

        // 기부(give) 기준으로 내림차순 정렬
        let sortedArr = Object.values(aggregated).sort((a, b) => b.give - a.give);

        renderTable(sortedArr);
    }

    // 화면에 표 그리기
    function renderTable(dataArr) {
        document.getElementById('loading').style.display = 'none';
        const content = document.getElementById('board-content');
        content.innerHTML = "";

        if (dataArr.length === 0) {
            content.innerHTML = "<div style='text-align:center; padding:30px; color:#94a3b8;'>해당 기간의 기록이 없습니다.</div>";
            return;
        }

        let html = "";
        dataArr.forEach((user, index) => {
            const rank = index + 1;
            let rankClass = "";
            if (rank === 1) rankClass = "rank-1";
            else if (rank === 2) rankClass = "rank-2";
            else if (rank === 3) rankClass = "rank-3";

            const link = user.mid 
                ? `https://ygosu.com/minilog/?member=${user.mid}&m2=profile` 
                : `https://ygosu.com/all_search/?keyword=${encodeURIComponent(user.nick)}&search_field=w`;

            html += `
                <div class="trow">
                    <div class="col-rank ${rankClass}">${rank}</div>
                    <div class="col-nick"><a href="${link}" target="_blank">${user.nick}</a></div>
                    <div class="col-give">+ ${user.give.toLocaleString()}</div>
                    <div class="col-recv">- ${user.recv.toLocaleString()}</div>
                </div>
            `;
        });
        content.innerHTML = html;
    }

    // 웹페이지 열리자마자 실행
    fetchData();
</script>

</body>
</html>
